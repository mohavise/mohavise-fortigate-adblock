name: Update FortiGate Adblock

on:
  workflow_dispatch:
  schedule:
    # 03:00 Asia/Tehran = 23:30 UTC on the previous day.
    - cron: "30 23 * * *"

permissions:
  contents: write

jobs:
  update-adblock:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FortiGate adblock feed
        shell: pwsh
        run: ./scripts/build-fortigate-adblock.ps1

      - name: Commit updated feed
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fortigate-domains.txt fortigate-hosts.txt
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "Update FortiGate adblock feed"
          git push

