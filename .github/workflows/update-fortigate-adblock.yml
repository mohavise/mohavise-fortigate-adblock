name: Update FortiGate Adblock

on:
  workflow_dispatch:
  schedule:
    # 03:30 Asia/Tehran = 00:00 UTC. Runs after the core repo updates.
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  update-adblock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FortiGate adblock feed
        run: bash ./scripts/build-fortigate-adblock.sh

      - name: Commit updated FortiGate feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fortigate-adblock-domains.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update FortiGate adblock feed"
          git push
